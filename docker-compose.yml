version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: jyotish_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       jyotish_db
      POSTGRES_USER:     jyotish_user
      POSTGRES_PASSWORD: jyotish_pass
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U jyotish_user -d jyotish_db"]
      interval: 5s
      timeout:  5s
      retries:  5

  web:
    build: .
    container_name: jyotish_backend
    env_file: .env.docker
    expose:
      - "8000"          # internal only, nginx talks to this
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - static_files:/app/staticfiles
      - media_files:/app/media

  nginx:
    image: nginx:alpine
    container_name: jyotish_nginx
    ports:
      - "8000:80"       # keep your existing port so nothing else changes
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - web

volumes:
  postgres_data:
  static_files:
  media_files: